<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safe & Sound — Scheduling Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.18);
      --gold-border: rgba(201,168,76,0.28);
      --bg: #0c0b08;
      --surface: rgba(18,15,9,0.97);
      --text: #ede5d0;
      --text-dim: #8a7a5a;
      --text-muted: #4a3e28;
      --user-bg: rgba(255,255,255,0.04);
      --user-border: rgba(255,255,255,0.09);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(120,90,20,0.05) 0%, transparent 60%),
        #0c0b08;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      padding: 12px 0;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 0 0 16px;
      flex-shrink: 0;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 6px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 300;
      letter-spacing: 3px;
      color: #f5f0e8;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 3px;
      font-weight: 300;
    }

    .header-rule {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 10px auto 0;
    }

    /* Chat box */
    .chat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(201,168,76,0.08);
      min-height: 0;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 22px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #2a2010 transparent;
      min-height: 0;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 2px; }

    /* Message row */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.3s ease both;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .avatar.assistant {
      background: linear-gradient(135deg, #c9a84c 0%, #7a5a18 100%);
      color: #fff;
    }

    .avatar.user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: #666;
      font-size: 14px;
    }

    /* Bubble */
    .bubble {
      max-width: 80%;
      padding: 11px 15px;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 300;
    }

    .bubble.assistant {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: #a09080;
    }

    .bubble p { margin: 2px 0; }
    .bubble strong { color: var(--gold); font-weight: 500; }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.4;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }

    /* Booking card */
    .booking-card {
      margin-top: 4px;
      padding: 14px 16px;
      background: rgba(201,168,76,0.04);
      border: 1px solid var(--gold-border);
      border-radius: 2px;
      font-size: 12px;
    }

    .booking-card-title {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .booking-row {
      display: flex;
      gap: 8px;
      margin-bottom: 5px;
    }

    .booking-label {
      color: var(--text-muted);
      min-width: 110px;
      text-transform: capitalize;
    }

    .booking-value { color: #c8b87a; }

    /* Status banner */
    .status-banner {
      margin: 0 22px 12px;
      padding: 10px 14px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 300;
    }

    .status-banner.submitting {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold);
    }

    .status-banner.success {
      background: rgba(76,175,80,0.08);
      border: 1px solid rgba(76,175,80,0.25);
      color: #81c784;
    }

    .status-banner.manual {
      background: rgba(255,152,0,0.08);
      border: 1px solid rgba(255,152,0,0.25);
      color: #ffb74d;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--gold-border);
      margin: 0 22px;
      flex-shrink: 0;
    }

    /* Input area */
    .input-area {
      padding: 14px 22px 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 2px;
      padding: 10px 13px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
      rows: 1;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: rgba(201,168,76,0.45); }

    button#send {
      background: linear-gradient(135deg, #c9a84c, #7a5818);
      border: none;
      border-radius: 2px;
      padding: 10px 22px;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button#send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 10px 0 0;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-eyebrow">White Glove Service · Sarasota, FL</div>
    <h1>Safe &amp; Sound</h1>
    <div class="header-sub">Delivery &amp; Moving</div>
    <div class="header-rule"></div>
  </div>

  <div class="chat-box">
    <div class="messages" id="messages"></div>
    <div id="status-area"></div>
    <div class="divider"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Type your message…" rows="1"></textarea>
      <button id="send">Send ✦</button>
    </div>
  </div>

  <div class="footer">Mon–Fri 8am–4pm &nbsp;·&nbsp; Sat by Appt &nbsp;·&nbsp; Sun Closed</div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const statusArea = document.getElementById('status-area');

  let history = [];

  function renderText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .split('\n')
      .map(l => `<p>${l || '&nbsp;'}</p>`)
      .join('');
  }

  function addMessage(role, content) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'assistant' ? 'S&S' : '✦';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = renderText(content);

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar assistant';
    avatar.textContent = 'S&S';

    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant typing';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function setStatus(type, msg) {
    statusArea.innerHTML = `<div class="status-banner ${type}">${msg}</div>`;
  }

  function extractBooking(text) {
    const match = text.match(/BOOKING_DATA:(\{.*\})/);
    if (match) { try { return JSON.parse(match[1]); } catch { return null; } }
    return null;
  }

  function cleanText(text) {
    return text.replace(/BOOKING_DATA:\{.*\}/, '').trim();
  }

  function showBookingCard(data) {
    const labels = {
      name: 'Name', phone: 'Phone', email: 'Email', service: 'Service',
      pickupAddress: 'Pickup', dropoffAddress: 'Dropoff', date: 'Date',
      time: 'Time', items: 'Items', stairs: 'Stairs',
      estimatedTotal: 'Est. Total', notes: 'Notes'
    };
    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = `<div class="booking-card-title">Booking Summary</div>` +
      Object.entries(data)
        .filter(([,v]) => v && v !== 'N/A')
        .map(([k,v]) => `
          <div class="booking-row">
            <span class="booking-label">${labels[k] || k}:</span>
            <span class="booking-value">${v}</span>
          </div>`).join('');
    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function submitToCalendar(booking) {
    setStatus('submitting', '⏳ Submitting appointment to Google Calendar…');
    try {
      const res = await fetch('/api/calendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ booking })
      });
      const data = await res.json();
      if (data.success) {
        setStatus('success', '✅ Appointment submitted to Google Calendar for owner review.');
      } else {
        setStatus('manual', '⚠️ Please add this appointment to your calendar manually using the booking summary above.');
      }
    } catch {
      setStatus('manual', '⚠️ Please add this appointment to your calendar manually using the booking summary above.');
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || 'Something went wrong. Please try again.';
      const booking = extractBooking(raw);
      const display = cleanText(raw);

      removeTyping();
      addMessage('assistant', display);
      history.push({ role: 'assistant', content: display });

      if (booking) {
        showBookingCard(booking);
        await submitToCalendar(booking);
      }
    } catch {
      removeTyping();
      addMessage('assistant', 'Sorry, trouble connecting right now. Please call us or try again shortly.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Initial greeting
  window.addEventListener('load', () => {
    addMessage('assistant', 'Welcome to Safe & Sound Delivery & Moving 🏛️\n\nI\'m your personal scheduling assistant, here to help you get a quote and book your service quickly and easily.\n\nMay I start with your name?');
  });

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
